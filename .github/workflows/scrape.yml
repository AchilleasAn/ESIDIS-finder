name: ΕΣΗΔΗΣ Scraper

on:
  schedule:
    - cron: '0 5,10,15,20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install ChromeDriver
        run: |
          pip install webdriver-manager
          python -c "from webdriver_manager.chrome import ChromeDriverManager; ChromeDriverManager().install()"

      - name: Install Python dependencies
        run: pip install selenium webdriver-manager requests beautifulsoup4

      - name: Run scraper
        run: python esidis_scraper.py

      - name: Commit results
        run: |
          git config user.name "ΕΣΗΔΗΣ Bot"
          git config user.email "bot@esidis-monitor"
          git add results.json scraper.log
          git diff --staged --quiet || git commit -m "Update $(date +'%d/%m/%Y %H:%M')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,esidis_scraper.py,README.md,scraper.log'
