<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΚΗΜΔΗΣ On-Demand Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --primary: #1f6feb;
    --primary-hover: #388bfd;
    --green: #238636;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; min-height: 100vh;}
  
  header {
    background: var(--surface); padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
  }
  
  .title { font-size: 18px; font-weight: 600; display:flex; align-items:center; gap:8px;}
  .meta { color: var(--muted); font-size: 13px; }
  
  .controls {
      display: flex; gap: 10px; align-items: center; padding: 16px 24px;
      border-bottom: 1px solid var(--border); background: var(--bg);
  }
  
  .btn {
    background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 6px;
    cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-green { background: var(--green); }
  .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px;}
  
  #settings-panel {
    display: none; padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
    gap: 12px; align-items: center; flex-wrap: wrap;
  }
  
  .container { padding: 24px; overflow-x: auto; }
  
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius:6px; overflow:hidden;}
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #21262d; font-weight: 600; font-size: 12px; text-transform: uppercase; color: var(--muted); }
  td { vertical-align: middle; }
  
  .adam-link { color: var(--primary-hover); text-decoration: none; font-weight: 500;}
  .adam-link:hover { text-decoration: underline; }
  
  /* Modal Styles */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
  }
  .modal-content {
    background: var(--surface); width: 90%; max-width: 800px; max-height: 85vh; border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 25px rgba(0,0,0,0.5); border: 1px solid var(--border);
  }
  .modal-header {
    padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
  }
  .modal-title { font-weight: 600; font-size:16px; color: var(--text); }
  .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-body {
    padding: 16px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px;
    line-height: 1.5; color: #c9d1d9; background: #0d1117;
  }
</style>
</head>
<body>

<header>
  <div class="title">ΚΗΜΔΗΣ On-Demand Monitor</div>
  <div class="meta">
      Ημερομηνία Αναζήτησης: <strong id="search-date" style="color:var(--text);">—</strong> | 
      Σύνολο: <strong id="total-count" style="color:var(--text);">0</strong>
  </div>
</header>

<div class="controls">
    <button class="btn btn-green" id="btn-ondemand" onclick="triggerScraper()">⚡ Έλεγχος Τώρα</button>
    <button class="btn" onclick="loadData()">🔄 Ανανέωση Σελίδας</button>
    <button class="btn btn-icon" onclick="toggleSettings()">⚙️</button>
</div>

<div id="settings-panel">
  <span style="font-size: 12px; color: var(--muted);">Εισάγετε GitHub PAT (Token) για το κουμπί Έλεγχος Τώρα:</span>
  <input type="password" id="gh-token-input" placeholder="ghp_..." style="background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 4px; font-size: 12px; width: 280px; outline: none;">
  <button class="btn" onclick="saveSettings()">Αποθήκευση</button>
</div>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Αναθέτουσα Αρχή</th>
        <th>Τίτλος</th>
        <th>Προϋπολογισμός</th>
        <th>ΑΔΑ / ΑΔΑΜ</th>
        <th>Κείμενο Διακήρυξης</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--muted);">Φόρτωση δεδομένων...</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" id="text-modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Κείμενο</div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let tendersData = [];

async function loadData() {
  try {
    const resp = await fetch('./results.json?' + Date.now());
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    
    document.getElementById('search-date').textContent = data.date_searched || '—';
    document.getElementById('total-count').textContent = data.total || '0';
    tendersData = data.tenders || [];
    
    const tbody = document.getElementById('table-body');
    if(tendersData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--muted);">Δεν βρέθηκαν διαγωνισμοί την αναγραφόμενη ημερομηνία.</td></tr>';
        return;
    }
    
    tbody.innerHTML = tendersData.map((t, index) => `
      <tr>
        <td style="max-width: 220px; font-size: 13px;">${t.contracting_authority}</td>
        <td style="max-width: 350px; font-size: 13px; line-height: 1.4;">${t.title}</td>
        <td style="font-weight: 500; font-family: monospace;">${t.budget}</td>
        <td>
          <div style="font-size: 11px; color: var(--muted); margin-bottom:4px;">ΑΔΑ: ${t.ada}</div>
          <a href="${t.pdf_url}" target="_blank" class="adam-link">ΑΔΑΜ: ${t.adam}</a>
        </td>
        <td>
          <button class="btn" style="padding: 6px 12px; font-size: 12px;" onclick="showText(${index})">📄 Ανάγνωση</button>
        </td>
      </tr>
    `).join('');
    
  } catch(e) {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: #ff7b72;">Δεν βρέθηκε αρχείο δεδομένων (results.json). Πατήστε το "Έλεγχος Τώρα" για να ξεκινήσει.</td></tr>';
  }
}

function showText(index) {
  const tender = tendersData[index];
  document.getElementById('modal-title').textContent = `Κείμενο ΑΔΑΜ: ${tender.adam}`;
  document.getElementById('modal-body').textContent = tender.pdf_text || 'Δεν υπάρχει διαθέσιμο κείμενο.';
  document.getElementById('text-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('text-modal').style.display = 'none';
}

// Ρυθμίσεις Token & On-Demand
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  if (panel.style.display === 'flex') {
    document.getElementById('gh-token-input').value = localStorage.getItem('gh_token') || '';
  }
}

function saveSettings() {
  const token = document.getElementById('gh-token-input').value.trim();
  localStorage.setItem('gh_token', token);
  alert('Το Token αποθηκεύτηκε τοπικά!');
  document.getElementById('settings-panel').style.display = 'none';
}

async function triggerScraper() {
  const token = localStorage.getItem('gh_token');
  if (!token) {
    alert('Προσθέστε το GitHub Token από το γρανάζι πρώτα!');
    toggleSettings();
    return;
  }

  const btn = document.getElementById('btn-ondemand');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.innerHTML = '⏳ Εκτέλεση (Παρακαλώ περιμένετε)...';

  const hostname = window.location.hostname;
  const pathname = window.location.pathname;
  let owner = "AchilleasAn"; 
  let repo = "ESIDIS-finder";   
  
  if (hostname.includes("github.io")) {
    owner = hostname.split(".")[0];
    repo = pathname.split("/")[1] || repo;
  }

  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/scrape.yml/dispatches`;
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main' }) 
    });

    if (response.ok) {
      alert('Η αναζήτηση στο ΚΗΜΔΗΣ ξεκίνησε! Επειδή κατεβάζει και διαβάζει τα PDF, μπορεί να πάρει 1-3 λεπτά. Η σελίδα θα ανανεωθεί αυτόματα μόλις τελειώσει.');
      // Ελέγχει αυτόματα μετά από 2 λεπτά
      setTimeout(() => { loadData(); }, 120000);
    } else {
      const errData = await response.json().catch(() => ({}));
      alert('❌ Σφάλμα εκκίνησης: ' + (errData.message || response.statusText));
    }
  } catch (e) {
    alert('❌ Σφάλμα δικτύου: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.innerHTML = originalText;
  }
}

loadData();
</script>

</body>
</html>
